<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Générateur de Fiches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
    
    <div class="d-flex flex-column align-items-center" style="width: 100%; max-width: 400px;">
        <h1 class="mb-4 text-center text-primary fw-bold">Générateur de fiches</h1>
        
        <div class="card bg-secondary text-white p-4 shadow w-100">
            <h2 class="text-center mb-4 fs-4">📝 Inscription</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger p-2 text-center" style="font-size: 0.9rem;">
                    ⚠️ {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <form action="/register" method="POST">
                <div class="mb-3">
                    <label class="form-label">Adresse E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 mt-2 fw-bold">Créer mon compte</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/login" class="text-white-50 btn-sm text-decoration-none">Déjà inscrit ? Se connecter</a>
            </div>
        </div>
    </div>

</body>
</html>
