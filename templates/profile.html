<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h3 class="mb-0 fw-bold">Mon Profil</h3>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center shadow-sm" style="width: 80px; height: 80px;">
                            <span class="fs-1 text-secondary">👨‍🎓</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Adresse Email</label>
                        <input type="text" class="form-control bg-light" value="{{ email }}" readonly>
                    </div>

                    <hr>

                    <div class="d-grid gap-2 mt-4">
                        <a href="/" class="btn btn-outline-secondary fw-bold">Retour Accueil</a>
                        <a href="/logout" class="btn btn-outline-danger fw-bold">Se déconnecter</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
